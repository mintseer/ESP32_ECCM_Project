[platformio]
default_envs = gateway

[env]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 230400
upload_speed = 921600
lib_ldf_mode = deep+
build_flags =
    -Wall
    -Wextra
    -D CORE_DEBUG_LEVEL=0

[env:transmitter]
build_src_filter =
    +<transmitter_main.cpp>
    +<common.cpp>
build_flags =
    ${env.build_flags}
    -D NODE_ROLE_TRANSMITTER

[env:gateway]
build_src_filter =
    +<gateway_main.cpp>
    +<common.cpp>
build_flags =
    ${env.build_flags}
    -D NODE_ROLE_GATEWAY

[env:jammer]
build_src_filter =
    +<jammer_main.cpp>
    +<common.cpp>
build_flags =
    ${env.build_flags}
    -D NODE_ROLE_JAMMER
